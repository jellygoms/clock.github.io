<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Clock</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0c101b;
            color: #ffffff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .clock-container {
            position: relative;
            display: inline-block;
            font-size: 16vw; 
            font-weight: 200;
            letter-spacing: -2px;
        }

        .ampm {
            position: absolute;
            top: -0.2em;
            right: 0;
            font-size: 0.25em;
            font-weight: 300;
            letter-spacing: 0;
        }

        .date-container {
            position: absolute;
            bottom: 8%;
            font-size: 2.5vw;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <span class="ampm" id="ampm">PM</span>
        <span id="time">0:00</span>
    </div>

    <div class="date-container" id="date">
        0월 0일 요일
    </div>

    <script>
        function updateClock() {
            var now = new Date();
            
            // 1. 시간 계산 (구형 자바스크립트 호환 방식)
            var hours = now.getHours();
            var minutes = now.getMinutes();
            var ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; // 0시는 12시로 변경

            // 분이 10 미만일 때 앞에 0 붙이기 (구형 방식)
            if (minutes < 10) {
                minutes = '0' + minutes;
            }

            // 텍스트 결합 구형 방식으로 수정 (백틱 `` 사용 안함)
            document.getElementById('time').innerHTML = hours + ':' + minutes;
            document.getElementById('ampm').innerHTML = ampm;

            // 2. 날짜 및 요일 계산
            var months = now.getMonth() + 1;
            var date = now.getDate();
            var weekDays = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
            var dayOfWeek = weekDays[now.getDay()];

            // 날짜 업데이트
            document.getElementById('date').innerHTML = months + '월 ' + date + '일 ' + dayOfWeek;
        }

        // 1초마다 시계 갱신
        setInterval(updateClock, 1000);
        // 실행 즉시 시계 표시
        updateClock();

        // 터치 스크롤 방지
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, false);
    </script>
</body>
</html>
