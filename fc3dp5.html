<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium 3D Flip Clock (p5.js Font-Fixed)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0f14;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        let cards = [];
        let prevH = "", prevM = "";
        let customFont;

        // 폰트 증발 현상을 막기 위해 캔버스가 켜지기 전 폰트 파일을 서버에서 선제 다운로드
        function preload() {
            // WEBGL 3D 렌더링 엔진과 호환성이 가장 좋은 구글 폰트(Roboto-Bold) 배치
            customFont = loadFont('https://themes.googleusercontent.com/static/fonts/roboto/v10/Bd7va8V_9fA6m8unbJeguA.ttf');
        }

        function setup() {
            let canvas = createCanvas(windowWidth, windowHeight, WEBGL);
            canvas.parent('canvas-container');
            
            // 외부 로드 폰트 세팅 지정
            textFont(customFont);
            textAlign(CENTER, CENTER);

            for (let i = 0; i < 4; i++) {
                cards.push(new FlipCard());
            }
            updateTime(true);
        }

        function draw() {
            background(13, 15, 20);
            
            // 3D 입체 라이팅 최적화
            ambientLight(110);
            directionalLight(220, 220, 220, 0, 0, -1);

            updateTime(false);

            let cardW = min(width * 0.16, 150); 
            let cardH = cardW * 1.4; 
            let gap = cardW * 0.15; 
            let totalW = (cardW * 4) + (gap * 3) + (cardW * 0.5); 

            push();
            translate(-totalW / 2 + cardW / 2, 0);

            // 1. 시 (Card 1, Card 2)
            cards[0].display(cardW, cardH);
            translate(cardW + gap, 0);
            cards[1].display(cardW, cardH);
            
            // 2. 구분 기호 (:)
            translate(cardW/2 + gap, -cardH * 0.03); 
            drawSeparator(cardW * 0.15); 
            
            // 3. 분 (Card 3, Card 4)
            translate(cardW/2 + gap, cardH * 0.03); 
            cards[2].display(cardW, cardH);
            translate(cardW + gap, 0);
            cards[3].display(cardW, cardH);

            pop();
        }

        function updateTime(isFirst) {
            let h = nf(hour(), 2);
            let m = nf(minute(), 2);

            if (isFirst) {
                prevH = h; prevM = m;
                cards[0].init(h[0]); cards[1].init(h[1]);
                cards[2].init(m[0]); cards[3].init(m[1]);
                return;
            }

            if (h !== prevH) {
                if (h[0] !== prevH[0]) cards[0].flipTo(h[0]);
                if (h[1] !== prevH[1]) cards[1].flipTo(h[1]);
                prevH = h;
            }
            if (m !== prevM) {
                if (m[0] !== prevM[0]) cards[2].flipTo(m[0]);
                if (m[1] !== prevM[1]) cards[3].flipTo(m[1]);
                prevM = m;
            }
        }

        function drawSeparator(size) {
            push();
            noStroke();
            fill(224, 230, 237, 180);
            ellipse(0, -size * 1.5, size, size); 
            ellipse(0, size * 1.5, size, size); 
            pop();
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        class FlipCard {
            constructor() {
                this.currentVal = "0";
                this.nextVal = "0";
                this.isFlipped = false;
                this.angle = 0; 
                this.bounce = 0; 
            }

            init(val) {
                this.currentVal = val;
                this.nextVal = val;
            }

            flipTo(newVal) {
                if (this.currentVal === newVal) return; 
                this.nextVal = newVal;
                this.isFlipped = true;
                this.angle = 0;
                this.bounce = 0;
            }

            display(w, h) {
                if (this.isFlipped) {
                    this.angle += 5.5; 
                    if (this.angle >= 180) {
                        this.currentVal = this.nextVal;
                        this.isFlipped = false;
                        this.angle = 0;
                        this.bounce = 15; 
                    }
                }

                if (this.bounce > 0) {
                    this.bounce *= -0.8; 
                    if (abs(this.bounce) < 0.5) this.bounce = 0; 
                }

                // 폰트 여백 조건 반영 (카드의 78% 비율 크기 고정)
                let fontSize = w * 0.78; 
                textSize(fontSize);
                noStroke();

                // 레이어 1: 하단 배경 (미래의 숫자)
                push();
                fill(30, 34, 45); 
                rectMode(CENTER);
                translate(0, h/4); 
                rect(0, 0, w, h/2, 0, 0, 12, 12); 
                fill(255);
                translate(0, -h/4); 
                // WEBGL 텍스트 높낮이 미세 튜닝 보정 수치 설정
                text(this.nextVal, 0, -h * 0.05);
                pop();

                // 레이어 2: 상단 배경 (현재 숫자)
                push();
                fill(36, 41, 54); 
                rectMode(CENTER);
                translate(0, -h/4); 
                rect(0, 0, w, h/2, 12, 12, 0, 0); 
                fill(255);
                translate(0, h/4); 
                text(this.currentVal, 0, -h * 0.05);
                pop();

                // 레이어 3: 회전하는 3D 플립 플레이트
                if (this.isFlipped) {
                    push();
                    if (this.angle < 90) {
                        rotateX(-radians(this.angle)); 
                        fill(lerpColor(color(36, 41, 54), color(15, 18, 24), this.angle/90));
                        rectMode(CENTER);
                        translate(0, -h/4);
                        rect(0, 0, w, h/2, 12, 12, 0, 0); 
                        
                        rotateX(radians(this.angle)); 
                        fill(255, lerp(255, 100, this.angle/90));
                        translate(0, h/4);
                        text(this.currentVal, 0, -h * 0.05);
                    } else {
                        rotateX(-radians(this.angle)); 
                        fill(lerpColor(color(15, 18, 24), color(30, 34, 45), (this.angle-90)/90));
                        rectMode(CENTER);
                        translate(0, h/4); 
                        rect(0, 0, w, h/2, 0, 0, 12, 12); 
                        
                        rotateX(radians(this.angle)); 
                        fill(255, lerp(100, 255, (this.angle-90)/90));
                        translate(0, -h/4); 
                        text(this.nextVal, 0, -h * 0.05);
                    }
                    pop();
                }

                // 레이어 4: 안착 진동 레이어 (Bounce 물리 궤적)
                if (this.bounce !== 0 && !this.isFlipped) {
                    push();
                    rotateX(radians(this.bounce)); 
                    fill(30, 34, 45); 
                    rectMode(CENTER);
                    translate(0, h/4);
                    rect(0, 0, w, h/2, 0, 0, 12, 12);
                    fill(255);
                    translate(0, -h/4);
                    text(this.currentVal, 0, -h * 0.05);
                    pop();
                }

                // 아날로그 미드 컷 라인 디테일
                push();
                stroke(10, 12, 16, 220); 
                strokeWeight(2);
                line(-w/2, 0, w/2, 0); 
                pop();
            }
        }
    </script>
</body>
</html>
