<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate 3D Flip Clock (p5.js Zero-Dependency)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0f14;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        let cards = [];
        let prevH = "", prevM = "";
        let fontPoints = {}; // 0~9 숫자의 뼈대 좌표를 담을 벡터 맵

        function setup() {
            let canvas = createCanvas(windowWidth, windowHeight, WEBGL);
            canvas.parent('canvas-container');
            
            // 폰트 파일 오류를 우회하기 위해, 숫자를 그릴 3D 수학적 기하 좌표 벡터 정의
            initFontPoints();

            for (let i = 0; i < 4; i++) {
                cards.push(new FlipCard());
            }
            updateTime(true);
        }

        function draw() {
            background(13, 15, 20);
            
            // 시각적 입체감을 극대화하는 조명 세팅
            ambientLight(140);
            directionalLight(255, 255, 255, 0.3, 0.3, -1);

            updateTime(false);

            // 화면 크기 반응형 비율 스케일 연산
            let cardW = min(width * 0.16, 150); 
            let cardH = cardW * 1.4; 
            let gap = cardW * 0.15; 
            let totalW = (cardW * 4) + (gap * 3) + (cardW * 0.5); 

            push();
            translate(-totalW / 2 + cardW / 2, 0);

            // 1. 시 영역 (카드 1, 카드 2)
            cards[0].display(cardW, cardH);
            translate(cardW + gap, 0);
            cards[1].display(cardW, cardH);
            
            // 2. 구분 기호 (:)
            translate(cardW/2 + gap, 0); 
            drawSeparator(cardW * 0.12); 
            
            // 3. 분 영역 (카드 3, 카드 4)
            translate(cardW/2 + gap, 0); 
            cards[2].display(cardW, cardH);
            translate(cardW + gap, 0);
            cards[3].display(cardW, cardH);

            pop();
        }

        function updateTime(isFirst) {
            let h = nf(hour(), 2);
            let m = nf(minute(), 2);

            if (isFirst) {
                prevH = h; prevM = m;
                cards[0].init(h[0]); cards[1].init(h[1]);
                cards[2].init(m[0]); cards[3].init(m[1]);
                return;
            }

            if (h !== prevH) {
                if (h[0] !== prevH[0]) cards[0].flipTo(h[0]);
                if (h[1] !== prevH[1]) cards[1].flipTo(h[1]);
                prevH = h;
            }
            if (m !== prevM) {
                if (m[0] !== prevM[0]) cards[2].flipTo(m[0]);
                if (m[1] !== prevM[1]) cards[3].flipTo(m[1]);
                prevM = m;
            }
        }

        function drawSeparator(size) {
            push();
            noStroke();
            fill(224, 230, 237, 200);
            translate(0, -size * 1.5, 1);
            sphere(size * 0.4); // 더욱 입체적인 구체 분리점 연출
            translate(0, size * 3, 0);
            sphere(size * 0.4);
            pop();
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        // 외부 폰트 파일 없이 화면에 완벽하고 깔끔한 숫자를 선으로 드로잉하기 위한 7세그먼트 스타일 기하 알고리즘
        function initFontPoints() {
            // 디지털 숫자를 표현하는 세그먼트 좌표들 정의
            fontPoints['0'] = [1,2,3,4,5,6];
            fontPoints['1'] = [2,3];
            fontPoints['2'] = [1,2,7,5,4];
            fontPoints['3'] = [1,2,7,3,4];
            fontPoints['4'] = [6,7,2,3];
            fontPoints['5'] = [1,6,7,3,4];
            fontPoints['6'] = [1,6,5,4,3,7];
            fontPoints['7'] = [1,2,3];
            fontPoints['8'] = [1,2,3,4,5,6,7];
            fontPoints['9'] = [1,2,3,4,6,7];
        }

        // 3D 공간 상에 황금비 마진을 가진 숫자를 벡터 그래픽으로 렌더링하는 핵심 함수
        function drawVectorNumber(numStr, w, h) {
            let segs = fontPoints[numStr] || [];
            let sw = w * 0.45; // 숫자의 가로폭 비율 고정
            let sh = h * 0.65; // 숫자의 세로폭 비율 고정 (황금 여백 확보)
            
            stroke(255);
            strokeWeight(w * 0.08); // 고급스럽고 도톰한 서체 두께 연출
            strokeCap(ROUND);
            strokeJoin(ROUND);
            noFill();

            push();
            translate(0, 0, 2); // 패널 위로 밀착 출력

            // 각 세그먼트 위치 그리기
            if (segs.includes(1)) line(-sw/2, -sh/2, sw/2, -sh/2);     // 상
            if (segs.includes(2)) line(sw/2, -sh/2, sw/2, 0);          // 우상
            if (segs.includes(3)) line(sw/2, 0, sw/2, sh/2);           // 우하
            if (segs.includes(4)) line(-sw/2, sh/2, sw/2, sh/2);       // 하
            if (segs.includes(5)) line(-sw/2, 0, -sw/2, sh/2);         // 좌하
            if (segs.includes(6)) line(-sw/2, -sh/2, -sw/2, 0);        // 좌상
            if (segs.includes(7)) line(-sw/2, 0, sw/2, 0);             // 중

            pop();
        }

        class FlipCard {
            constructor() {
                this.currentVal = "0";
                this.nextVal = "0";
                this.isFlipped = false;
                this.angle = 0; 
                this.bounce = 0; 
            }

            init(val) {
                this.currentVal = val;
                this.nextVal = val;
            }

            flipTo(newVal) {
                if (this.currentVal === newVal) return; 
                this.nextVal = newVal;
                this.isFlipped = true;
                this.angle = 0;
                this.bounce = 0;
            }

            display(w, h) {
                if (this.isFlipped) {
                    this.angle += 4.5; // 우아하고 묵직한 속도 밸런스
                    if (this.angle >= 180) {
                        this.currentVal = this.nextVal;
                        this.isFlipped = false;
                        this.angle = 0;
                        this.bounce = 14; // 매력적인 튕김 수치
                    }
                }

                if (this.bounce > 0) {
                    this.bounce *= -0.75; 
                    if (abs(this.bounce) < 0.4) this.bounce = 0; 
                }

                noStroke();

                // 1. 하단 배경 고정 패널
                push();
                fill(30, 34, 45); 
                rectMode(CENTER);
                translate(0, h/4, 0); 
                // 위아래 완벽한 하프 컷 적용을 위해 마스킹 렌더링
                drawingContext.disable(drawingContext.DEPTH_TEST);
                rect(0, 0, w, h/2, 0, 0, 14, 14); 
                drawingContext.enable(drawingContext.DEPTH_TEST);
                translate(0, -h/4, 0);
                drawVectorNumber(this.nextVal, w, h);
                pop();

                // 2. 상단 배경 고정 패널
                push();
                fill(36, 41, 54); 
                rectMode(CENTER);
                translate(0, -h/4, 0); 
                drawingContext.disable(drawingContext.DEPTH_TEST);
                rect(0, 0, w, h/2, 14, 14, 0, 0); 
                drawingContext.enable(drawingContext.DEPTH_TEST);
                translate(0, h/4, 0); 
                drawVectorNumber(this.currentVal, w, h);
                pop();

                // 3. 3D 리얼 무빙 회전 패널
                if (this.isFlipped) {
                    push();
                    if (this.angle < 90) {
                        rotateX(-radians(this.angle)); 
                        fill(lerpColor(color(36, 41, 54), color(14, 16, 22), this.angle/90));
                        rectMode(CENTER);
                        translate(0, -h/4, 0);
                        rect(0, 0, w, h/2, 14, 14, 0, 0); 
                        
                        rotateX(radians(this.angle)); 
                        translate(0, h/4, 0);
                        drawVectorNumber(this.currentVal, w, h);
                    } else {
                        rotateX(-radians(this.angle)); 
                        fill(lerpColor(color(14, 16, 22), color(30, 34, 45), (this.angle-90)/90));
                        rectMode(CENTER);
                        translate(0, h/4, 0); 
                        rect(0, 0, w, h/2, 0, 0, 14, 14); 
                        
                        rotateX(radians(this.angle)); 
                        translate(0, -h/4, 0); 
                        drawVectorNumber(this.nextVal, w, h);
                    }
                    pop();
                }

                // 4. 안착 시 잔진동(Bounce) 감쇠 물리 패널
                if (this.bounce !== 0 && !this.isFlipped) {
                    push();
                    rotateX(radians(this.bounce)); 
                    fill(30, 34, 45); 
                    rectMode(CENTER);
                    translate(0, h/4, 0);
                    rect(0, 0, w, h/2, 0, 0, 14, 14); 
                    translate(0, -h/4, 0);
                    drawVectorNumber(this.currentVal, w, h);
                    pop();
                }

                // 클래식 수평 분할 라인
                push();
                stroke(10, 11, 15, 240); 
                strokeWeight(2.5);
                line(-w/2, 0, 1, w/2, 0, 1); 
                pop();
            }
        }
    </script>
</body>
</html>
