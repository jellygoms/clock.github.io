<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium 3D Flip Clock - HM</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0f14;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .flip-clock {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 85vw;
            max-width: 800px;
            gap: 2vw;
        }

        .separator {
            font-size: 10vw; /* 점 크기도 살짝 조절 */
            color: #e0e6ed;
            font-weight: 300;
            text-shadow: 0px 6px 15px rgba(0, 0, 0, 0.7);
            padding-bottom: 1.5vw;
            margin: 0 1vw;
        }

        .flip-card {
            position: relative;
            flex: 1;
            max-width: 18vw;
            height: 25vw;
            max-height: 35vh;
            perspective: 500px;
            border-radius: 16px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.65);
        }

        .panel {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            overflow: hidden;
            background: linear-gradient(to bottom, #242936, #1a1d26);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            justify-content: center;
            transform-style: preserve-3d;
        }

        /* 🛠️ 숫자 크기 및 마진 수정 (여백 확보) */
        .panel-number {
            position: absolute;
            width: 100%;
            font-size: 13.5vw; /* 👈 기존 18vw에서 13.5vw로 줄여 상하좌우 여백 확보 */
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0px 4px 8px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .panel-top {
            top: 0;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.5);
            align-items: flex-start;
        }
        .panel-top .panel-number {
            top: 0;
            height: 200%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 🛠️ 폰트 크기가 줄어든 만큼 상단 절반 카드의 수직 정렬 미세 보정 */
            transform: translateY(1%); 
        }

        .panel-bottom {
            bottom: 0;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            align-items: flex-end;
        }
        .panel-bottom .panel-number {
            bottom: 0;
            height: 200%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 🛠️ 폰트 크기가 줄어든 만큼 하단 절반 카드의 수직 정렬 미세 보정 */
            transform: translateY(-1%);
        }

        .panel-flip {
            transform-origin: center bottom;
            z-index: 3;
        }

        .flip-animation {
            animation: flip 0.85s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes flip {
            0% {
                transform: rotateX(0deg);
                filter: brightness(1);
            }
            40% {
                filter: brightness(0.4);
            }
            100% {
                transform: rotateX(-180deg);
                filter: brightness(0.1);
            }
        }
    </style>
</head>
<body>

    <div class="flip-clock">
        <div class="flip-card" id="h1">
            <div class="panel panel-bottom"><div class="panel-number">0</div></div>
            <div class="panel panel-top"><div class="panel-number">0</div></div>
        </div>
        <div class="flip-card" id="h2">
            <div class="panel panel-bottom"><div class="panel-number">0</div></div>
            <div class="panel panel-top"><div class="panel-number">0</div></div>
        </div>
        
        <div class="separator">:</div>
        
        <div class="flip-card" id="m1">
            <div class="panel panel-bottom"><div class="panel-number">0</div></div>
            <div class="panel panel-top"><div class="panel-number">0</div></div>
        </div>
        <div class="flip-card" id="m2">
            <div class="panel panel-bottom"><div class="panel-number">0</div></div>
            <div class="panel panel-top"><div class="panel-number">0</div></div>
        </div>
    </div>

    <script>
        function updateCard(cardId, targetValue) {
            const card = document.getElementById(cardId);
            const currentStaticTop = card.querySelector('.panel-top .panel-number');
            const currentStaticBottom = card.querySelector('.panel-bottom .panel-number');
            
            if (currentStaticTop.textContent === targetValue) return;

            const flipPanel = document.createElement('div');
            flipPanel.className = 'panel panel-top panel-flip';
            
            const flipNumber = document.createElement('div');
            flipNumber.className = 'panel-number';
            flipNumber.textContent = currentStaticTop.textContent;
            
            flipPanel.appendChild(flipNumber);
            card.appendChild(flipPanel);

            currentStaticTop.textContent = targetValue;
            flipPanel.classList.add('flip-animation');

            setTimeout(() => {
                currentStaticBottom.textContent = targetValue;
            }, 425);

            flipPanel.addEventListener('animationend', () => {
                flipPanel.remove();
            });
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');

            updateCard('h1', h[0]);
            updateCard('h2', h[1]);
            updateCard('m1', m[0]);
            updateCard('m2', m[1]);
        }

        setInterval(updateClock, 1000);
        updateClock();

        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
