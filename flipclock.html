<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Flip Clock</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0d13;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        /* 시계 전체 컨테이너: 화면 비율에 맞춰 전체 크기를 유연하게 조절 */
        .flip-clock {
            display: flex;
            justify-content: center;
            align-items: center;
            /* 최대 가로 폭을 화면의 95%로 제한하여 절대 잘리지 않게 방지 */
            width: 95vw;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 플립 카드 한 칸의 스타일: 비율(Aspect Ratio) 방식으로 고정 */
        .flip-card {
            position: relative;
            flex: 1; /* 카드들이 화면 너비에 맞춰 균등하게 크기 조절됨 */
            max-width: 12vw; /* 각 카드의 최대 크기 제한 */
            height: 16vw;    /* 3:4 비율에 가깝게 높이 설정 */
            max-height: 22vh; /* 세로 화면에서도 잘리지 않도록 제한 */
            font-size: 11vw;  /* 카드 크기에 맞춘 폰트 사이즈 */
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            border-radius: 1vw;
            background: #1e222d;
            margin: 0 0.4vw; /* 카드 간 세밀한 간격 */
            
            -webkit-transform: translate3d(0,0,0);
            transform: translate3d(0,0,0);
        }

        /* 카드 높이에 맞춰 글자 수직 정렬을 동적으로 잡기 위한 믹스인 효과 */
        .card-half {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            overflow: hidden;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            justify-content: center;
        }

        .card-top {
            top: 0;
            border-top-left-radius: 1vw;
            border-top-right-radius: 1vw;
            border-bottom: 1px solid rgba(0, 0, 0, 0.4);
            align-items: flex-start;
        }
        /* 상단 숫자가 반 잘려 보이지 않게 정렬 유지 */
        .card-top span {
            transform: translateY(12%);
            -webkit-transform: translateY(12%);
        }

        .card-bottom {
            bottom: 0;
            border-bottom-left-radius: 1vw;
            border-bottom-right-radius: 1vw;
            align-items: flex-end;
        }
        /* 하단 숫자가 반 잘려 보이지 않게 정렬 유지 */
        .card-bottom span {
            transform: translateY(-38%);
            -webkit-transform: translateY(-38%);
        }

        /* 구분점 (:) 스타일 */
        .separator {
            font-size: 8vw;
            color: #ffffff;
            font-weight: 300;
            opacity: 0.6;
            margin: 0 1vw;
            padding-bottom: 1vw;
        }

        /* 애니메이션 효과 */
        @keyframes flipTop {
            0% { transform: scaleY(1); background: #1e222d; }
            50% { transform: scaleY(0); background: #11141a; }
            100% { transform: scaleY(0); }
        }
        @-webkit-keyframes flipTop {
            0% { -webkit-transform: scaleY(1); background: #1e222d; }
            50% { -webkit-transform: scaleY(0); background: #11141a; }
            100% { -webkit-transform: scaleY(0); }
        }

        .animate .card-top {
            animation: flipTop 0.3s ease-in-out;
            -webkit-animation: flipTop 0.3s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="flip-clock">
        <div class="flip-card" id="h1"><div class="card-half card-top"><span>0</span></div><div class="card-half card-bottom"><span>0</span></div></div>
        <div class="flip-card" id="h2"><div class="card-half card-top"><span>0</span></div><div class="card-half card-bottom"><span>0</span></div></div>
        
        <div class="separator">:</div>
        
        <div class="flip-card" id="m1"><div class="card-half card-top"><span>0</span></div><div class="card-half card-bottom"><span>0</span></div></div>
        <div class="flip-card" id="m2"><div class="card-half card-top"><span>0</span></div><div class="card-half card-bottom"><span>0</span></div></div>
        
        <div class="separator">:</div>
        
        <div class="flip-card" id="s1"><div class="card-half card-top"><span>0</span></div><div class="card-half card-bottom"><span>0</span></div></div>
        <div class="flip-card" id="s2"><div class="card-half card-top"><span>0</span></div><div class="card-half card-bottom"><span>0</span></div></div>
    </div>

    <script>
        function setCardValue(cardId, newValue) {
            var card = document.getElementById(cardId);
            var topSpan = card.querySelector('.card-top span');
            var bottomSpan = card.querySelector('.card-bottom span');
            
            if (topSpan.innerHTML !== newValue) {
                card.classList.remove('animate');
                var reflow = card.offsetWidth; 
                
                topSpan.innerHTML = newValue;
                bottomSpan.innerHTML = newValue;
                card.classList.add('animate');
            }
        }

        function updateClock() {
            var now = new Date();
            var hours = now.getHours();
            var minutes = now.getMinutes();
            var seconds = now.getSeconds();
            
            var hStr = (hours < 10 ? '0' : '') + hours;
            var mStr = (minutes < 10 ? '0' : '') + minutes;
            var sStr = (seconds < 10 ? '0' : '') + seconds;

            setCardValue('h1', hStr.charAt(0));
            setCardValue('h2', hStr.charAt(1));
            setCardValue('m1', mStr.charAt(0));
            setCardValue('m2', mStr.charAt(1));
            setCardValue('s1', sStr.charAt(0));
            setCardValue('s2', sStr.charAt(1));
        }

        setInterval(updateClock, 500);
        updateClock();

        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, false);
    </script>
</body>
</html>
